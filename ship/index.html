<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="renutri — sua despensa organizada, sua comida aproveitada."
    />
    <title>renutri</title>
    <link rel="stylesheet" href="styles.css" />
    <!--
      Theme bootstrap — runs synchronously before first paint to avoid a
      flash of the wrong theme. Wrapped in try/catch because some browsers
      block localStorage on file:// (this page is meant to run locally),
      and a throw here would abort before the app renders.
        1. explicit 'light' | 'dark' wins
        2. otherwise follow the OS (prefers-color-scheme)
        3. light is the :root default, so only dark needs the attribute
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var prefersDark =
            window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme =
            stored === 'light' || stored === 'dark'
              ? stored
              : prefersDark
                ? 'dark'
                : 'light';
          if (theme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
          }
        } catch (e) {
          /* localStorage unavailable — fall back to the light default */
        }
      })();
    </script>
  </head>
  <body>
    <!-- The entire UI (header, pages, footer, modals) is rendered by app.js. -->
    <div id="root"></div>
    <script src="app.js" defer></script>
  </body>
</html>
