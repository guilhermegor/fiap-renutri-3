<!doctype html><html lang="pt-BR"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><meta name="description" content="renutri — sua despensa organizada, sua comida aproveitada."/><title>renutri</title><script>(function () {
        var stored = localStorage.getItem('theme');
        var prefersDark =
          window.matchMedia &&
          window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme;

        if (stored === 'light' || stored === 'dark') {
          theme = stored;
        } else if (stored === 'system' || stored === null) {
          theme = prefersDark ? 'dark' : 'light';
        } else {
          theme = 'light';
        }

        if (theme === 'dark') {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();</script><script defer="defer" src="/fiap-renutri-3/bundle.22303dde16cd1cb4f2fa.js"></script><link href="/fiap-renutri-3/main.f8f09cf5ed8ad637c4a8.css" rel="stylesheet"></head><body><div id="root"></div></body></html>
